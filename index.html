<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Modpack Translator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .top-navbar {
            background: #1e1e1e;
            border-bottom: 1px solid #2d2d2d;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .full-width {
            width: 100%;
            height: 100%;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* 1. 시작 페이지 */
        .welcome-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
            text-align: center;
        }

        .welcome-sub {
            font-size: 14px;
            color: #888;
            margin-bottom: 40px;
            text-align: center;
        }

        .hub-btn-group {
            display: flex;
            gap: 25px;
        }

        .hub-card-btn {
            background: #1e1e1e;
            border: 2px solid #2d2d2d;
            border-radius: 12px;
            width: 220px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .hub-card-btn:hover {
            border-color: #3498db;
            background: #252526;
            transform: translateY(-4px);
        }

        .hub-card-btn .icon {
            font-size: 45px;
            margin-bottom: 15px;
            display: block;
        }

        .hub-card-btn .title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }

        /* 2. 모드팩 그리드 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .pack-card {
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 15px;
            position: relative;
            cursor: pointer;
            transition: border-color 0.15s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pack-card:hover {
            border-color: #3498db;
            background: #222;
        }

        .pack-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .badge-curseforge {
            background-color: #e67e22;
        }

        .badge-prism {
            background-color: #2980b9;
        }

        .badge-modrinth {
            background-color: #27ae60;
        }

        .badge-custom {
            background-color: #7f8c8d;
        }

        .pack-img {
            width: 64px;
            height: 64px;
            border-radius: 8px;
            margin-top: 15px;
            margin-bottom: 12px;
            object-fit: cover;
        }

        .pack-name {
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            color: #fff;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pack-version {
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }

        /* 3. 모드팩 세팅 상세 폼 */
        .detail-layout {
            display: flex;
            gap: 20px;
            align-items: stretch;
            height: 100%;
        }

        .panel-side {
            width: 280px;
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .panel-main {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #2d2d2d;
            border-radius: 8px;
            padding: 25px;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        select, input[type="text"], input[type="password"] {
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #3d3d3d;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 13px;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #3498db;
        }

        .radio-box-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .radio-box-item {
            background: #252526;
            border: 1px solid #3d3d3d;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        /* 4. 실시간 진행 콘솔 */
        #console-log-view {
            background: #000;
            border: 1px solid #2d2d2d;
            border-radius: 6px;
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            color: #d4d4d4;
            white-space: pre-wrap;
            margin-bottom: 20px;
            height: 400px;
        }

        .success-box {
            background: #1b2a1c;
            border: 1px solid #27ae60;
            border-radius: 6px;
            padding: 20px;
            text-align: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .bottom-action-bar {
            background: #1a1a1a;
            padding: 15px 30px;
            border-top: 1px solid #2d2d2d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-info {
            flex: 1;
            margin-right: 20px;
        }

        #status-txt {
            font-size: 13px;
            color: #3498db;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .progress-bg {
            background: #2d2d2d;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar {
            background: #3498db;
            width: 0%;
            height: 100%;
            transition: width 0.15s ease;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2980b9;
        }

        .btn-back {
            background: transparent;
            border: 1px solid #555;
            color: #ccc;
            margin-right: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="top-navbar">
    <div class="logo" onclick="navigateTo('start')">⛏️ Minecraft Modpack Studio</div>
    <div style="font-size: 12px; color: #3498db; font-weight: bold;">API Server Connected</div>
</div>

<div class="main-content" id="view-slot">
    <div class="screen-node" id="screen-start">
        <h1 class="welcome-title">마인크래프트 모드팩 번역 허브</h1>
        <p class="welcome-sub">원하시는 인스턴스 작업을 하단 카드박스에서 골라 연동해 주세요.</p>
        <div class="hub-btn-group">
            <div class="hub-card-btn" onclick="navigateTo('pack-grid')">
                <span class="icon">🌐</span>
                <span class="title">모드팩 번역하기</span>
            </div>
            <div class="hub-card-btn" onclick="window.open('https://mcat.2odk.com/modpacks', '_blank')">
                <span class="icon">📥</span>
                <span class="title">모드팩 다운로드</span>
            </div>
        </div>
    </div>

    <div class="screen-node full-width hidden" id="screen-pack-grid">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="font-size:18px; color:#fff;">번역 타겟 모드팩 인스턴스 선택</h2>
            <button class="btn btn-back" onclick="navigateTo('start')">처음으로</button>
        </div>
        <div class="grid-container" id="grid-pack-wrapper"></div>
    </div>

    <div class="screen-node full-width hidden" id="screen-form-setup">
        <div class="detail-layout">
            <div class="panel-side">
                <img alt="Icon" class="pack-img" id="detail-pack-img" src="">
                <h3 id="detail-pack-name" style="font-size:15px; color:#fff; text-align:center; margin-bottom:5px;">
                    -</h3>
                <span class="pack-version" id="detail-pack-version">-</span>
                <div style="margin-top:auto; width:100%;">
                    <button class="btn btn-back" onclick="navigateTo('pack-grid')"
                            style="width:100%; margin-bottom:8px;">이전단계
                    </button>
                    <button class="btn" onclick="runTranslationPipeline()" style="width:100%;">번역 시작하기</button>
                </div>
            </div>

            <div class="panel-main">
                <h3 style="font-size:14px; font-weight:bold; color:#3498db; margin-bottom:12px;">번역기 엔진 API 선택</h3>
                <div class="radio-box-group">
                    <label class="radio-box-item"><input checked name="engine" onchange="toggleEngineFields()" type="radio"
                                                         value="1"> Google (무료)</label>
                    <label class="radio-box-item"><input name="engine" onchange="toggleEngineFields()" type="radio"
                                                         value="2"> Papago</label>
                    <label class="radio-box-item"><input name="engine" onchange="toggleEngineFields()" type="radio"
                                                         value="3"> ChatGPT</label>
                    <label class="radio-box-item"><input name="engine" onchange="toggleEngineFields()" type="radio"
                                                         value="5"> Gemini (추천)</label>
                    <label class="radio-box-item"><input name="engine" onchange="toggleEngineFields()" type="radio"
                                                         value="4"> 로컬 NLLB</label>
                </div>

                <div id="setup-dynamic-fields">
                    <div class="form-group id-field-key hidden">
                        <label id="lbl-api-key">API 인증 키 (API KEY)</label>
                        <input id="input-api-key" type="password">
                    </div>
                    <div class="form-group id-field-model hidden">
                        <label>인공지능 모델명 (Model Version)</label>
                        <input id="input-model-name" type="text">
                    </div>
                    <div class="form-group id-field-url hidden">
                        <label>로컬 엔드포인트 호스트 엔드 주소 URL</label>
                        <input id="input-endpoint-url" type="text">
                    </div>
                </div>

                <h3 style="font-size:14px; font-weight:bold; color:#3498db; margin-top:25px; margin-bottom:12px;">언어 설정
                    및 옵션</h3>
                <div style="display:flex; gap:15px; margin-bottom:15px;">
                    <div style="flex:1;">
                        <label>출발 언어 코드</label>
                        <select id="src-lang">
                            <option selected value="en">영어 (en)</option>
                            <option value="ja">일본어 (ja)</option>
                        </select>
                    </div>
                    <div style="flex:1;">
                        <label>도착 번역 언어 코드</label>
                        <select id="dest-lang">
                            <option selected value="ko">한국어 (ko)</option>
                        </select>
                    </div>
                </div>
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:#e0e0e0; font-size:13px; margin-top:15px;">
                    <input checked id="skip-chapters" style="width:auto;" type="checkbox"> 퀘스트 챕터명 및 시스템 그룹 식별자 번역 제외
                    (추천)
                </label>
            </div>
        </div>
        </div>

    <div class="screen-node full-width hidden" id="screen-processing">
        <h2 id="process-headline" style="font-size:16px; margin-bottom:10px; color:#fff;">🔄 실시간 통합 번역 파이프라인 콘솔 로그</h2>
        <div id="console-log-view"></div>

        <div class="success-box hidden" id="result-success-box">
            <span style="font-size:32px;">🎉</span>
            <h3 style="font-size:16px; font-weight:bold;">모든 리소스팩 빌드 및 패키징 완료!</h3>
            <p style="font-size:13px; color:#aaa;">크롬의 다운로드 기능으로 파일 저장이 자동으로 시작되었습니다.</p>
            <button class="btn" onclick="navigateTo('start')" style="margin-top:5px; background:#27ae60;">메인 스튜디오로 복귀
            </button>
        </div>
    </div>
</div>

<div class="bottom-action-bar hidden" id="global-bottom-bar">
    <div class="status-info">
        <div id="status-txt">대기 중...</div>
        <div class="progress-bg">
            <div class="progress-bar" id="main-progress"></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://127.0.0.1:18443";
    let backendData = null;
    let selectedPackIdx = null;
    let pollingInterval = null;

    document.addEventListener('DOMContentLoaded', function () {
        // FastAPI 로컬 엔드포인트에서 데이터 로드
        fetch(`${API_BASE}/api/initial-data`)
            .then(res => res.json())
            .then(res => {
                backendData = res;
                initFormInputs(res.config);
            }).catch(err => console.error("백엔드 서버가 켜져 있는지 확인하세요.", err));
    });

    function initFormInputs(cfg) {
        document.getElementById('input-api-key').value = cfg.saved_api_key;
        document.getElementById('input-model-name').value = cfg.saved_model_name;
        document.getElementById('input-endpoint-url').value = cfg.saved_endpoint_url;
        let rb = document.querySelector(`input[name="engine"][value="${cfg.saved_engine_choice}"]`);
        if (rb) rb.checked = true;
        toggleEngineFields();
    }

    function navigateTo(screenId) {
        document.querySelectorAll('.screen-node').forEach(el => el.classList.add('hidden'));
        document.getElementById('global-bottom-bar').classList.add('hidden');
        let viewNode = document.getElementById('screen-' + screenId);
        if (viewNode) viewNode.classList.remove('hidden');

        if (screenId === 'pack-grid') {
            document.getElementById('view-slot').classList.add('full-width');
            renderGridCards(backendData.modpacks);
        } else if (screenId === 'processing') {
            document.getElementById('view-slot').classList.add('full-width');
            document.getElementById('global-bottom-bar').classList.remove('hidden');
        } else {
            document.getElementById('view-slot').classList.remove('full-width');
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }
    }

    function renderGridCards(packs) {
        let wrapper = document.getElementById('grid-pack-wrapper');
        wrapper.innerHTML = "";
        if (!packs || packs.length === 0) {
            wrapper.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#666;">스캔된 인스턴스가 없습니다.</div>`;
            return;
        }
        packs.forEach(pack => {
            let card = document.createElement('div');
            card.className = "pack-card";
            card.onclick = () => {
                selectedPackIdx = pack.index;
                document.getElementById('detail-pack-img').src = pack.icon;
                document.getElementById('detail-pack-name').innerText = pack.name;
                document.getElementById('detail-pack-version').innerText = pack.version;
                navigateTo('form-setup');
            };
            let lKey = pack.launcher.toLowerCase();
            let launcherClass = lKey.includes("curse") ? "badge-curseforge" : lKey.includes("prism") ? "badge-prism" : lKey.includes("modrinth") ? "badge-modrinth" : "badge-custom";

            card.innerHTML = `
                    <span class="pack-badge ${launcherClass}">${pack.launcher}</span>
                    <img class="pack-img" src="${pack.icon}">
                    <div class="pack-name">${pack.name}</div>
                    <div class="pack-version">${pack.version}</div>
                `;
            wrapper.appendChild(card);
        });
    }

    function toggleEngineFields() {
        let choice = document.querySelector('input[name="engine"]:checked').value;
        document.querySelectorAll('#setup-dynamic-fields .form-group').forEach(el => el.classList.add('hidden'));
        if (choice === "2") {
            document.getElementById('lbl-api-key').innerText = "Papago Secret Key:";
            document.querySelector('.id-field-key').classList.remove('hidden');
        } else if (choice === "3" || choice === "5") {
            document.getElementById('lbl-api-key').innerText = (choice === "3" ? "ChatGPT" : "Gemini") + " API Key:";
            document.querySelector('.id-field-key').classList.remove('hidden');
            document.querySelector('.id-field-model').classList.remove('hidden');
        } else if (choice === "4") {
            document.querySelector('.id-field-url').classList.remove('hidden');
        }
    }

    function runTranslationPipeline() {
        navigateTo('processing');
        document.getElementById('console-log-view').classList.remove('hidden');
        document.getElementById('console-log-view').innerText = "";
        document.getElementById('result-success-box').classList.add('hidden');

        let reqData = {
            src_lang: document.getElementById('src-lang').value,
            dest_lang: document.getElementById('dest-lang').value,
            skip_chapters: document.getElementById('skip-chapters').checked,
            engine_choice: document.querySelector('input[name="engine"]:checked').value,
            selected_pack_idx: selectedPackIdx,
            api_key: document.getElementById('input-api-key').value,
            model_name: document.getElementById('input-model-name').value,
            endpoint_url: document.getElementById('input-endpoint-url').value
        };

        // 백엔드 비동기 파이프라인 트리거 요청
        fetch(`${API_BASE}/api/start-translation`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(reqData)
        }).then(() => {
            // 실시간 로그 및 진행률 전송을 위한 폴링 가동 (0.2초 주기)
            pollingInterval = setInterval(pollStatus, 200);
        });
    }

    function pollStatus() {
        fetch(`${API_BASE}/api/status`)
            .then(res => res.json())
            .then(status => {
                // 진행상태 업데이트
                document.getElementById('status-txt').innerText = status.text;
                document.getElementById('main-progress').style.width = status.pct + "%";

                // 로그 몰아서 업데이트
                let consoleBox = document.getElementById('console-log-view');
                consoleBox.innerText = status.logs.join("\n");
                consoleBox.scrollTop = consoleBox.scrollHeight;

                // 완료 시 자동 다운로드 트리거
                if (status.complete && pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    triggerAutoDownload(status.b64_data, status.zip_filename);
                }
            });
    }

    function triggerAutoDownload(base64ZipData, filename) {
        let element = document.createElement('a');
        element.setAttribute('href', 'data:application/zip;base64,' + base64ZipData);
        element.setAttribute('download', filename);
        element.style.display = 'none';
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);

        document.getElementById('console-log-view').classList.add('hidden');
        document.getElementById('result-success-box').classList.remove('hidden');
    }

    function startHeartbeat() {
        // 3초마다 백엔드에 핑(Ping)을 날려 탭이 살아있음을 알림
        setInterval(() => {
            fetch(`${API_BASE}/api/heartbeat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            }).catch(err => console.log("서버 연결 끊김"));
        }, 3000);

        // 사용자가 탭을 닫거나 브라우저를 종료하는 순간 즉시 마지막 신호를 전송 (선택 사항, 더 빠른 종료용)
        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon(`${API_BASE}/api/heartbeat`);
        });
    }

    // 기존 DOMContentLoaded 이벤트 리스너 안쪽이나 하단에 실행 코드를 넣어줍니다.
    document.addEventListener('DOMContentLoaded', function () {
        // 하트비트 가동
        startHeartbeat();

        // 기존 초기 데이터 로드 로직...
        fetch(`${API_BASE}/api/initial-data`)
            .then(res => res.json())
            .then(res => {
                backendData = res;
                initFormInputs(res.config);
            }).catch(err => console.error("백엔드 서버 확인 필요", err));
    });
</script>
</body>
</html>
